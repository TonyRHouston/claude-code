name: Remove Autoclose Label on Activity
on:
  issue_comment:
    types:
    - created
  workflow_dispatch: {}
permissions:
  issues: write
jobs:
  remove-autoclose:
    if: 'github.event.issue.state == ''open'' &&

      contains(github.event.issue.labels.*.name, ''autoclose'') &&

      github.event.comment.user.login != ''github-actions[bot]''

      '
    runs-on: ubuntu-latest
    steps:
    - name: Remove autoclose label
      uses: actions/github-script@v7
      with:
        script: "console.log(`Removing autoclose label from issue #${context.issue.number} due to new comment from ${context.payload.comment.user.login}`);\n\ntry {\n  // Remove the autoclose label\n  await github.rest.issues.removeLabel({\n    owner: context.repo.owner,\n    repo: context.repo.repo,\n    issue_number: context.issue.number,\n    name: 'autoclose'\n  });\n  \n  console.log(`Successfully removed autoclose label from issue #${context.issue.number}`);\n} catch (error) {\n  // If the label was already removed or doesn't exist, that's fine\n  if (error.status === 404) {\n    console.log(`Autoclose label was already removed from issue #${context.issue.number}`);\n  } else {\n    throw error;\n  }\n}"
