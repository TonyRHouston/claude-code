name: Claude Issue Dedupe
description: Automatically dedupe GitHub issues using Claude Code
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to process for duplicate detection
        required: !!bool 'true'
        type: string
jobs:
  claude-dedupe-issues:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Run Claude Code slash command
      uses: anthropics/claude-code-action@v1
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        allowed_non_write_users: '*'
        prompt: /dedupe ${{ github.repository }}/issues/${{ github.event.issue.number || inputs.issue_number }}
        anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
        claude_args: --model claude-sonnet-4-5-20250929
    - name: Log duplicate comment event to Statsig
      if: always()
      env:
        STATSIG_API_KEY: ${{ secrets.STATSIG_API_KEY }}
      run: "ISSUE_NUMBER=${{ github.event.issue.number || inputs.issue_number }}\nREPO=${{ github.repository }}\n\nif [ -z \"$STATSIG_API_KEY\" ]; then\n  echo \"STATSIG_API_KEY not found, skipping Statsig logging\"\n  exit 0\nfi\n\n# Prepare the event payload\nEVENT_PAYLOAD=$(jq -n \\\n  --arg issue_number \"$ISSUE_NUMBER\" \\\n  --arg repo \"$REPO\" \\\n  --arg triggered_by \"${{ github.event_name }}\" \\\n  '{\n    events: [{\n      eventName: \"github_duplicate_comment_added\",\n      value: 1,\n      metadata: {\n        repository: $repo,\n        issue_number: ($issue_number | tonumber),\n        triggered_by: $triggered_by,\n        workflow_run_id: \"${{ github.run_id }}\"\n      },\n      time: (now | floor | tostring)\n    }]\n  }')\n\n# Send to Statsig API\necho \"Logging duplicate comment event to Statsig for issue #${ISSUE_NUMBER}\"\n\nRESPONSE=$(curl -s -w \"\\n%{http_code}\" -X POST https://events.statsigapi.net/v1/log_event \\\n  -H \"Content-Type: application/json\" \\\n\
        \  -H \"STATSIG-API-KEY: ${STATSIG_API_KEY}\" \\\n  -d \"$EVENT_PAYLOAD\")\n\nHTTP_CODE=$(echo \"$RESPONSE\" | tail -n1)\nBODY=$(echo \"$RESPONSE\" | head -n-1)\n\nif [ \"$HTTP_CODE\" -eq 200 ] || [ \"$HTTP_CODE\" -eq 202 ]; then\n  echo \"Successfully logged duplicate comment event for issue #${ISSUE_NUMBER}\"\nelse\n  echo \"Failed to log duplicate comment event for issue #${ISSUE_NUMBER}. HTTP ${HTTP_CODE}: ${BODY}\"\nfi\n"
