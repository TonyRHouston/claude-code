name: Log Issue Events to Statsig
on:
  workflow_dispatch: {}
jobs:
  log-to-statsig:
    runs-on: ubuntu-latest
    permissions:
      issues: read
    steps:
    - name: Log issue creation to Statsig
      env:
        STATSIG_API_KEY: ${{ secrets.STATSIG_API_KEY }}
        ISSUE_NUMBER: ${{ github.event.issue.number }}
        REPO: ${{ github.repository }}
        ISSUE_TITLE: ${{ github.event.issue.title }}
        AUTHOR: ${{ github.event.issue.user.login }}
        CREATED_AT: ${{ github.event.issue.created_at }}
      run: "# All values are now safely passed via environment variables\n# No direct templating in the shell script to prevent injection attacks\n\ncurl -X POST \"https://events.statsigapi.net/v1/log_event\" \\\n  -H \"Content-Type: application/json\" \\\n  -H \"statsig-api-key: $STATSIG_API_KEY\" \\\n  -d '{\n    \"events\": [{\n      \"eventName\": \"github_issue_created\",\n      \"metadata\": {\n        \"issue_number\": \"'\"$ISSUE_NUMBER\"'\",\n        \"repository\": \"'\"$REPO\"'\",\n        \"title\": \"'\"$(echo \"$ISSUE_TITLE\" | sed \"s/\\\"/\\\\\\\\\\\"/g\")\"'\",\n        \"author\": \"'\"$AUTHOR\"'\",\n        \"created_at\": \"'\"$CREATED_AT\"'\"\n      },\n      \"time\": '\"$(date +%s)000\"'\n    }]\n  }'"
